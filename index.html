<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Casio Futbol Dashboard</title>
<style>
@font-face {
  font-family: 'DSEG7';
  src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff') format('woff');
  font-weight: bold;
  font-style: normal;
}
@font-face {
  font-family: 'ShareTech';
  src: url('https://fonts.gstatic.com/s/sharetechmono/v15/J7aHnp1uDWRBEqV98dVQztYldFcLowEF.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a1a;
  color: #33ff66;
  font-family: 'ShareTech', 'Courier New', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-user-select: none;
  user-select: none;
}

/* === THEMES === */
body.theme-green { --lcd: #33ff66; --lcd-dim: #0a3318; --lcd-bg: #0d1f12; --lcd-border: #1a4d26; --lcd-shadow: rgba(51,255,102,0.15); }
body.theme-blue { --lcd: #66ccff; --lcd-dim: #0a2233; --lcd-bg: #0d1a2a; --lcd-border: #1a3d5c; --lcd-shadow: rgba(102,204,255,0.15); }
body.theme-bw { --lcd: #e0e0e0; --lcd-dim: #1a1a1a; --lcd-bg: #111111; --lcd-border: #333333; --lcd-shadow: rgba(224,224,224,0.1); }
body.theme-amber { --lcd: #ffaa00; --lcd-dim: #331a00; --lcd-bg: #1a1000; --lcd-border: #4d3300; --lcd-shadow: rgba(255,170,0,0.15); }

body { color: var(--lcd); background: var(--lcd-bg); }

.dashboard {
  max-width: 900px;
  margin: 0 auto;
  padding: 10px;
}

/* === CASIO FRAME === */
.casio-frame {
  border: 2px solid var(--lcd-border);
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 10px;
  background: var(--lcd-bg);
  box-shadow: inset 0 0 30px var(--lcd-shadow), 0 0 15px var(--lcd-shadow);
  position: relative;
}

.casio-frame::before {
  content: attr(data-label);
  position: absolute;
  top: -9px;
  left: 15px;
  background: var(--lcd-bg);
  padding: 0 8px;
  font-size: 11px;
  color: var(--lcd);
  opacity: 0.6;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* === TOP BAR: CLOCK + WEATHER === */
.top-bar {
  display: flex;
  gap: 10px;
  align-items: stretch;
}

.clock-section {
  flex: 1;
}

.clock-display {
  font-family: 'DSEG7', monospace;
  font-size: 52px;
  letter-spacing: 3px;
  text-align: center;
  line-height: 1;
  text-shadow: 0 0 20px var(--lcd-shadow);
  padding: 10px 0;
}

.clock-date {
  text-align: center;
  font-size: 13px;
  opacity: 0.7;
  margin-top: 5px;
  letter-spacing: 1px;
}

.weather-section {
  flex: 0 0 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.weather-temp {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  line-height: 1;
}

.weather-temp-num {
  font-family: 'DSEG7', monospace;
  font-size: 36px;
  text-shadow: 0 0 15px var(--lcd-shadow);
}

.weather-temp-deg {
  font-family: 'ShareTech', monospace;
  font-size: 18px;
  margin-top: 2px;
  margin-left: 2px;
  opacity: 0.8;
}

.weather-desc {
  font-family: 'ShareTech', monospace;
  font-size: 12px;
  opacity: 0.7;
  margin-top: 4px;
  text-align: center;
  letter-spacing: 1px;
}

.weather-icon {
  font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
  font-size: 22px;
  margin-bottom: 4px;
}

/* === CATEGORY TABS (top level: FAVS, leagues) === */
.cat-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-bottom: 10px;
  padding: 0 2px;
}

.cat-tab {
  background: transparent;
  border: 1px solid var(--lcd-border);
  color: var(--lcd);
  opacity: 0.45;
  padding: 5px 10px;
  font-family: 'ShareTech', monospace;
  font-size: 11px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.cat-tab:hover { opacity: 0.8; }
.cat-tab.active {
  opacity: 1;
  background: var(--lcd);
  color: var(--lcd-bg);
  border-color: var(--lcd);
  font-weight: bold;
}

.cat-tab.fav-tab {
  border-color: var(--lcd);
  opacity: 0.6;
}

/* === MATCHES === */
.matches-container {
  min-height: 280px;
}

.section-title {
  font-size: 12px;
  opacity: 0.5;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin: 12px 0 8px;
  border-bottom: 1px solid var(--lcd-border);
  padding-bottom: 4px;
}

.match-row {
  display: flex;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--lcd-dim);
  font-size: 13px;
  gap: 8px;
}

.match-row:last-child { border-bottom: none; }

.match-date {
  flex: 0 0 70px;
  font-size: 11px;
  opacity: 0.6;
}

.match-competition {
  flex: 0 0 55px;
  font-size: 10px;
  opacity: 0.4;
  letter-spacing: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.match-teams {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}

.match-home, .match-away {
  flex: 1;
}

.match-home { text-align: right; }
.match-away { text-align: left; }

.match-score {
  flex: 0 0 50px;
  text-align: center;
  font-family: 'DSEG7', monospace;
  font-size: 16px;
  text-shadow: 0 0 10px var(--lcd-shadow);
}

.match-score.pending {
  font-family: 'ShareTech', monospace;
  font-size: 11px;
  opacity: 0.5;
}

.match-live {
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.match-highlight {
  font-weight: bold;
  text-shadow: 0 0 8px var(--lcd-shadow);
}

.no-matches {
  text-align: center;
  opacity: 0.4;
  padding: 30px;
  font-size: 13px;
  letter-spacing: 2px;
}

/* team badge in fav view */
.match-badge {
  flex: 0 0 18px;
  font-size: 10px;
  text-align: center;
  opacity: 0.5;
  letter-spacing: 0;
}

/* === CONTROLS === */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding: 8px 0;
}

.theme-btn {
  background: transparent;
  border: 1px solid var(--lcd-border);
  color: var(--lcd);
  opacity: 0.5;
  padding: 3px 10px;
  font-family: 'ShareTech', monospace;
  font-size: 10px;
  cursor: pointer;
  border-radius: 3px;
  letter-spacing: 1px;
}

.theme-btn:hover { opacity: 0.8; }

.auto-label {
  font-size: 10px;
  opacity: 0.4;
  letter-spacing: 1px;
}

.brand-label {
  text-align: center;
  font-size: 10px;
  opacity: 0.25;
  letter-spacing: 3px;
  margin-top: 8px;
  text-transform: uppercase;
}

/* === LOADING === */
.loading-dots::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}
@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

/* === RESPONSIVE === */
@media (max-width: 600px) {
  .top-bar { flex-direction: column; }
  .weather-section { flex: none; }
  .clock-display { font-size: 38px; }
  .weather-temp-num { font-size: 28px; }
  .weather-temp-deg { font-size: 14px; }
  .match-competition { display: none; }
  .match-date { flex: 0 0 55px; font-size: 10px; }
  .match-score { flex: 0 0 40px; font-size: 14px; }
  .match-teams { font-size: 12px; }
  .cat-tab { font-size: 10px; padding: 3px 6px; }
}
</style>
</head>
<body class="theme-green">

<div class="dashboard">
  <!-- CLOCK + WEATHER -->
  <div class="top-bar">
    <div class="casio-frame clock-section" data-label="hora">
      <div class="clock-display" id="clock">--:--:--</div>
      <div class="clock-date" id="clockDate">---</div>
    </div>
    <div class="casio-frame weather-section" data-label="clima">
      <div class="weather-icon" id="weatherIcon">--</div>
      <div class="weather-temp" id="weatherTemp">
        <span class="weather-temp-num">--.-</span>
        <span class="weather-temp-deg"></span>
      </div>
      <div class="weather-desc" id="weatherDesc">CARGANDO<span class="loading-dots"></span></div>
    </div>
  </div>

  <!-- FOOTBALL -->
  <div class="casio-frame" data-label="partidos" style="margin-top:10px;">
    <div class="cat-tabs" id="catTabs"></div>
    <div class="matches-container" id="matchesContainer">
      <div class="no-matches">CARGANDO PARTIDOS<span class="loading-dots"></span></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div>
      <button class="theme-btn" onclick="cycleTheme()">TEMA</button>
      <button class="theme-btn" onclick="toggleAutoRotate()" id="autoBtn">AUTO: ON</button>
    </div>
    <span class="auto-label" id="refreshLabel">--</span>
  </div>
  <div class="brand-label">CASIO FUTBOL DASHBOARD</div>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
var LAT = -34.6037;
var LON = -58.3816;

// ============================================================
//  TEAMS
// ============================================================
var TEAMS = [
  { id: 'river',     name: 'RIVER',       apiId: 435,   color: '#ff3333' },
  { id: 'argentina', name: 'ARGENTINA',   apiId: 26,    color: '#75aadb' },
  { id: 'miami',     name: 'INTER MIA',   apiId: 18656, color: '#f7b5cd' },
  { id: 'barca',     name: 'BARCELONA',   apiId: 529,   color: '#a50044' },
  { id: 'real',      name: 'R. MADRID',   apiId: 541,   color: '#ffffff' },
  { id: 'atletico',  name: 'ATLETICO',    apiId: 530,   color: '#cb3524' },
  { id: 'inter',     name: 'INTER',       apiId: 505,   color: '#009cdc' },
  { id: 'manu',      name: 'MAN UTD',     apiId: 33,    color: '#da291c' },
  { id: 'manc',      name: 'MAN CITY',    apiId: 50,    color: '#6cabdd' }
];

// Category definitions: key -> { label, competitions (array of substrings to match) }
// 'favs' is special: shows all teams combined
// 'team-X' shows a specific team
var CATEGORIES = [
  { key: 'favs',    label: '\u2605 TODOS' },
  { key: 'team-0',  label: 'RIVER' },
  { key: 'team-1',  label: 'ARGENTINA' },
  { key: 'team-2',  label: 'INTER MIA' },
  { key: 'liga',    label: 'LA LIGA',    comps: ['La Liga', 'Copa del Rey', 'Supercopa'] },
  { key: 'premier', label: 'PREMIER',    comps: ['Premier League', 'FA Cup', 'EFL Cup'] },
  { key: 'seriea',  label: 'SERIE A',    comps: ['Serie A', 'Coppa Italia'] },
  { key: 'copas',   label: 'COPAS EUR',  comps: ['Champions League', 'Europa League', 'Conference League', 'UEFA Super Cup'] },
  { key: 'mundial', label: 'SELEC',      comps: ['World Cup', 'WC Qualification', 'Copa America', 'Friendlies'] }
];

var currentCat = 0;
var autoRotate = true;
var autoRotateTimer = null;
var matchData = {};
var allMatches = [];
var themes = ['theme-green', 'theme-blue', 'theme-bw', 'theme-amber'];
var currentTheme = 0;

// ============================================================
//  CLOCK
// ============================================================
function updateClock() {
  var now = new Date();
  var h = ('0' + now.getHours()).slice(-2);
  var m = ('0' + now.getMinutes()).slice(-2);
  var s = ('0' + now.getSeconds()).slice(-2);
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;

  var dias = ['DOM', 'LUN', 'MAR', 'MIE', 'JUE', 'VIE', 'SAB'];
  var meses = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
  var dateStr = dias[now.getDay()] + ' ' + now.getDate() + ' ' + meses[now.getMonth()] + ' ' + now.getFullYear();
  document.getElementById('clockDate').textContent = dateStr;
}

setInterval(updateClock, 1000);
updateClock();

// ============================================================
//  WEATHER
// ============================================================
var WMO_ICONS = {
  0: '\u2600\uFE0F', 1: '\uD83C\uDF24\uFE0F', 2: '\u26C5', 3: '\u2601\uFE0F',
  45: '\uD83C\uDF2B\uFE0F', 48: '\uD83C\uDF2B\uFE0F',
  51: '\uD83C\uDF26\uFE0F', 53: '\uD83C\uDF26\uFE0F', 55: '\uD83C\uDF27\uFE0F',
  61: '\uD83C\uDF27\uFE0F', 63: '\uD83C\uDF27\uFE0F', 65: '\uD83C\uDF27\uFE0F',
  71: '\uD83C\uDF28\uFE0F', 73: '\uD83C\uDF28\uFE0F', 75: '\uD83C\uDF28\uFE0F',
  80: '\uD83C\uDF26\uFE0F', 81: '\uD83C\uDF27\uFE0F', 82: '\uD83C\uDF27\uFE0F',
  95: '\u26C8\uFE0F', 96: '\u26C8\uFE0F', 99: '\u26C8\uFE0F'
};

var WMO_DESC = {
  0: 'DESPEJADO', 1: 'MAYORM. DESPEJADO', 2: 'PARCIALM. NUBLADO', 3: 'NUBLADO',
  45: 'NIEBLA', 48: 'NIEBLA',
  51: 'LLOVIZNA LEVE', 53: 'LLOVIZNA', 55: 'LLOVIZNA FUERTE',
  61: 'LLUVIA LEVE', 63: 'LLUVIA', 65: 'LLUVIA FUERTE',
  71: 'NIEVE LEVE', 73: 'NIEVE', 75: 'NIEVE FUERTE',
  80: 'CHUBASCOS', 81: 'CHUBASCOS', 82: 'CHUBASCOS FUERTES',
  95: 'TORMENTA', 96: 'TORMENTA C/GRANIZO', 99: 'TORMENTA FUERTE'
};

function fetchWeather() {
  var url = '/api/weather?lat=' + LAT + '&lon=' + LON;
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        var temp = data.current_weather.temperature;
        var code = data.current_weather.weathercode;
        document.querySelector('.weather-temp-num').textContent = temp.toFixed(1);
        document.querySelector('.weather-temp-deg').textContent = '\u00B0C';
        document.getElementById('weatherIcon').textContent = WMO_ICONS[code] || '\uD83C\uDF21\uFE0F';
        document.getElementById('weatherDesc').textContent = WMO_DESC[code] || 'CODIGO ' + code;
      } catch(e) {
        document.getElementById('weatherDesc').textContent = 'ERROR';
      }
    }
  };
  xhr.send();
}

fetchWeather();
setInterval(fetchWeather, 600000);

// ============================================================
//  FOOTBALL
// ============================================================
function buildCatTabs() {
  var container = document.getElementById('catTabs');
  container.innerHTML = '';
  for (var i = 0; i < CATEGORIES.length; i++) {
    var btn = document.createElement('button');
    var cls = 'cat-tab';
    if (i === currentCat) cls += ' active';
    if (CATEGORIES[i].key === 'favs') cls += ' fav-tab';
    btn.className = cls;
    btn.textContent = CATEGORIES[i].label;
    btn.setAttribute('data-idx', i);
    btn.onclick = function() {
      var idx = parseInt(this.getAttribute('data-idx'));
      selectCat(idx);
      resetAutoRotate();
    };
    container.appendChild(btn);
  }
}

function selectCat(idx) {
  currentCat = idx;
  var tabs = document.querySelectorAll('.cat-tab');
  for (var i = 0; i < tabs.length; i++) {
    var cls = 'cat-tab';
    if (i === idx) cls += ' active';
    if (CATEGORIES[i].key === 'favs') cls += ' fav-tab';
    tabs[i].className = cls;
  }
  renderView();
}

function fetchFootball() {
  var ids = [];
  for (var i = 0; i < TEAMS.length; i++) {
    ids.push(TEAMS[i].apiId);
  }
  var url = '/api/football?teams=' + ids.join(',');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          matchData = JSON.parse(xhr.responseText);
          buildAllMatches();
          renderView();
          var now = new Date();
          document.getElementById('refreshLabel').textContent =
            'ACT: ' + ('0' + now.getHours()).slice(-2) + ':' + ('0' + now.getMinutes()).slice(-2);
        } catch(e) {
          showError('ERROR AL PROCESAR DATOS');
        }
      } else {
        showError('ERROR AL CARGAR DATOS');
      }
    }
  };
  xhr.send();
}

function buildAllMatches() {
  // Flatten all matches from all teams into a single array, avoiding duplicates
  allMatches = [];
  var seen = {};
  for (var i = 0; i < TEAMS.length; i++) {
    var teamId = TEAMS[i].apiId;
    var data = matchData[teamId];
    if (!data) continue;
    var combined = (data.last || []).concat(data.next || []);
    for (var j = 0; j < combined.length; j++) {
      var m = combined[j];
      // Deduplicate by date + home + away
      var key = m.date + '|' + m.home + '|' + m.away;
      if (!seen[key]) {
        seen[key] = true;
        m._teamId = teamId;
        m._teamIdx = i;
        allMatches.push(m);
      }
    }
  }
  allMatches.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
}

function showError(msg) {
  document.getElementById('matchesContainer').innerHTML =
    '<div class="no-matches">' + msg + '</div>';
}

function renderView() {
  var cat = CATEGORIES[currentCat];
  var container = document.getElementById('matchesContainer');

  if (cat.key === 'favs') {
    renderFavsView(container);
  } else if (cat.key.indexOf('team-') === 0) {
    var teamIdx = parseInt(cat.key.split('-')[1]);
    renderTeamView(container, teamIdx);
  } else {
    renderLeagueView(container, cat);
  }
}

function renderFavsView(container) {
  if (allMatches.length === 0) {
    container.innerHTML = '<div class="no-matches">SIN PARTIDOS DISPONIBLES</div>';
    return;
  }

  var now = new Date();
  var past = [];
  var upcoming = [];

  for (var i = 0; i < allMatches.length; i++) {
    var m = allMatches[i];
    if (isFinished(m.status)) {
      past.push(m);
    } else {
      upcoming.push(m);
    }
  }

  // Past: most recent first, limit to 8
  past.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
  past = past.slice(0, 8);

  // Upcoming: soonest first, limit to 8
  upcoming.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
  upcoming = upcoming.slice(0, 8);

  var html = '';

  if (past.length > 0) {
    html += '<div class="section-title">ULTIMOS RESULTADOS</div>';
    for (var i = 0; i < past.length; i++) {
      html += renderMatchRow(past[i], null, true);
    }
  }

  if (upcoming.length > 0) {
    html += '<div class="section-title">PROXIMOS PARTIDOS</div>';
    for (var j = 0; j < upcoming.length; j++) {
      html += renderMatchRow(upcoming[j], null, true);
    }
  }

  if (html === '') {
    html = '<div class="no-matches">SIN PARTIDOS DISPONIBLES</div>';
  }

  container.innerHTML = html;
}

function renderTeamView(container, teamIdx) {
  var team = TEAMS[teamIdx];
  var data = matchData[team.apiId];

  if (!data) {
    container.innerHTML = '<div class="no-matches">CARGANDO<span class="loading-dots"></span></div>';
    return;
  }

  if ((!data.last || data.last.length === 0) && (!data.next || data.next.length === 0)) {
    container.innerHTML = '<div class="no-matches">SIN PARTIDOS DISPONIBLES</div>';
    return;
  }

  var html = '';

  if (data.last && data.last.length > 0) {
    html += '<div class="section-title">ULTIMOS RESULTADOS</div>';
    for (var i = 0; i < data.last.length; i++) {
      html += renderMatchRow(data.last[i], team.apiId, false);
    }
  }

  if (data.next && data.next.length > 0) {
    html += '<div class="section-title">PROXIMOS PARTIDOS</div>';
    for (var j = 0; j < data.next.length; j++) {
      html += renderMatchRow(data.next[j], team.apiId, false);
    }
  }

  container.innerHTML = html;
}

function renderLeagueView(container, cat) {
  // Filter allMatches by competition names
  var comps = cat.comps || [];
  var filtered = [];

  for (var i = 0; i < allMatches.length; i++) {
    var m = allMatches[i];
    for (var c = 0; c < comps.length; c++) {
      if (m.competition && m.competition.indexOf(comps[c]) !== -1) {
        filtered.push(m);
        break;
      }
    }
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-matches">SIN PARTIDOS EN ESTA LIGA</div>';
    return;
  }

  var past = [];
  var upcoming = [];

  for (var i = 0; i < filtered.length; i++) {
    if (isFinished(filtered[i].status)) {
      past.push(filtered[i]);
    } else {
      upcoming.push(filtered[i]);
    }
  }

  past.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
  past = past.slice(0, 8);
  upcoming.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
  upcoming = upcoming.slice(0, 8);

  var html = '';

  if (past.length > 0) {
    html += '<div class="section-title">ULTIMOS RESULTADOS</div>';
    for (var i = 0; i < past.length; i++) {
      html += renderMatchRow(past[i], null, true);
    }
  }

  if (upcoming.length > 0) {
    html += '<div class="section-title">PROXIMOS PARTIDOS</div>';
    for (var j = 0; j < upcoming.length; j++) {
      html += renderMatchRow(upcoming[j], null, true);
    }
  }

  container.innerHTML = html;
}

function isFinished(status) {
  return ['FT', 'AET', 'PEN', 'WO', 'AWD'].indexOf(status) !== -1;
}

function formatMatchDate(dateStr) {
  var d = new Date(dateStr);
  var dias = ['DOM', 'LUN', 'MAR', 'MIE', 'JUE', 'VIE', 'SAB'];
  var day = ('0' + d.getDate()).slice(-2);
  var month = ('0' + (d.getMonth() + 1)).slice(-2);
  var h = ('0' + d.getHours()).slice(-2);
  var m = ('0' + d.getMinutes()).slice(-2);
  return dias[d.getDay()] + ' ' + day + '/' + month + ' ' + h + ':' + m;
}

function shortCompetition(name) {
  if (!name) return '';
  var map = {
    'Primera Division': 'LIGA AR',
    'Copa Libertadores': 'LIBERT',
    'Copa Sudamericana': 'SUDAM',
    'Copa Argentina': 'COPA AR',
    'Copa de la Liga Profesional': 'COPA LP',
    'World Cup': 'MUNDIAL',
    'WC Qualification': 'ELIM',
    'WC Qualification South America': 'ELIM SA',
    'Copa America': 'C.AMER',
    'Friendlies': 'AMIST',
    'MLS': 'MLS',
    'Leagues Cup': 'L.CUP',
    'La Liga': 'LALIGA',
    'Champions League': 'UCL',
    'Copa del Rey': 'COPA R',
    'Serie A': 'SERIE A',
    'Coppa Italia': 'COPPA',
    'Premier League': 'PL',
    'FA Cup': 'FA CUP',
    'EFL Cup': 'EFL',
    'Europa League': 'UEL',
    'UEFA Super Cup': 'SUPRC',
    'Club World Cup': 'MUNDCL',
    'Supercopa de Espana': 'SUPC E',
    'Conference League': 'UECL'
  };
  for (var key in map) {
    if (name.indexOf(key) !== -1) return map[key];
  }
  return name.substring(0, 6).toUpperCase();
}

// Find which of our teams plays in this match
function findTeamBadge(match) {
  for (var i = 0; i < TEAMS.length; i++) {
    if (match.homeId === TEAMS[i].apiId || match.awayId === TEAMS[i].apiId) {
      return TEAMS[i].name.substring(0, 3);
    }
  }
  return '';
}

function renderMatchRow(match, highlightTeamId, showBadge) {
  var homeClass = '';
  var awayClass = '';

  if (highlightTeamId) {
    var isHome = match.homeId === highlightTeamId;
    homeClass = isHome ? ' match-highlight' : '';
    awayClass = !isHome ? ' match-highlight' : '';
  } else {
    // In combined view, highlight any of our teams
    for (var t = 0; t < TEAMS.length; t++) {
      if (match.homeId === TEAMS[t].apiId) { homeClass = ' match-highlight'; break; }
      if (match.awayId === TEAMS[t].apiId) { awayClass = ' match-highlight'; break; }
    }
  }

  var score = '';
  var scoreClass = 'match-score';

  if (match.status === 'FT' || match.status === 'AET' || match.status === 'PEN') {
    score = (match.homeGoals !== null ? match.homeGoals : '-') + '-' + (match.awayGoals !== null ? match.awayGoals : '-');
  } else if (match.status === 'LIVE' || match.status === '1H' || match.status === '2H' || match.status === 'HT' || match.status === 'ET') {
    score = (match.homeGoals !== null ? match.homeGoals : '0') + '-' + (match.awayGoals !== null ? match.awayGoals : '0');
    scoreClass += ' match-live';
  } else {
    score = 'VS';
    scoreClass += ' pending';
  }

  var statusLabel = '';
  if (match.status === 'LIVE' || match.status === '1H' || match.status === '2H') {
    statusLabel = ' [' + (match.elapsed || 'VIVO') + "']";
  } else if (match.status === 'HT') {
    statusLabel = ' [ET]';
  } else if (match.status === 'PEN') {
    statusLabel = ' (P)';
  } else if (match.status === 'AET') {
    statusLabel = ' (AET)';
  }

  var badgeHtml = '';
  if (showBadge) {
    badgeHtml = '<span class="match-badge">' + findTeamBadge(match) + '</span>';
  }

  return '<div class="match-row">' +
    badgeHtml +
    '<span class="match-date">' + formatMatchDate(match.date) + '</span>' +
    '<span class="match-competition">' + shortCompetition(match.competition) + '</span>' +
    '<div class="match-teams">' +
      '<span class="match-home' + homeClass + '">' + match.home + '</span>' +
      '<span class="' + scoreClass + '">' + score + statusLabel + '</span>' +
      '<span class="match-away' + awayClass + '">' + match.away + '</span>' +
    '</div>' +
  '</div>';
}

// ============================================================
//  AUTO ROTATE
// ============================================================
function startAutoRotate() {
  if (autoRotateTimer) clearInterval(autoRotateTimer);
  autoRotateTimer = setInterval(function() {
    if (!autoRotate) return;
    currentCat = (currentCat + 1) % CATEGORIES.length;
    selectCat(currentCat);
  }, 8000);
}

function resetAutoRotate() {
  if (autoRotate) {
    startAutoRotate();
  }
}

function toggleAutoRotate() {
  autoRotate = !autoRotate;
  document.getElementById('autoBtn').textContent = 'AUTO: ' + (autoRotate ? 'ON' : 'OFF');
  if (autoRotate) {
    startAutoRotate();
  } else {
    if (autoRotateTimer) clearInterval(autoRotateTimer);
  }
}

// ============================================================
//  THEME
// ============================================================
function cycleTheme() {
  currentTheme = (currentTheme + 1) % themes.length;
  document.body.className = themes[currentTheme];
}

// ============================================================
//  INIT
// ============================================================
buildCatTabs();
fetchFootball();
startAutoRotate();

setInterval(fetchFootball, 300000);
</script>
